apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Wraps the generic postgres component with litellm- prefix
# Produces: litellm-postgres (StatefulSet, Service)
# Tenant must provide litellm-postgres-secret (via SealedSecret, secretGenerator, etc.)
resources:
  - ../../../../components/apps/databases/postgres/

namePrefix: litellm-

patches:
  # namePrefix won't propagate to secretRef when the Secret is not in the build,
  # so we hardcode the prefixed name explicitly
  - target:
      kind: StatefulSet
      name: postgres
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: litellm-postgres-secret
