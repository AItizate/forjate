apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm
spec:
  serviceName: "vllm"
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          ports:
            - containerPort: 8000
          args:
            - "--model"
            - "$(MODEL_NAME)"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--dtype"
            - "$(DTYPE)"
          envFrom:
            - configMapRef:
                name: vllm-config
          env:
            - name: HF_HOME
              value: /data/huggingface
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
            limits:
              cpu: "8000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: vllm-volume
              mountPath: /data
              subPath: apps/vllm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: vllm-volume
          persistentVolumeClaim:
            claimName: pvc-vllm
