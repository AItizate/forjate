apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotrue-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotrue-authz
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gotrue-authz
    spec:
      containers:
        - name: gotrue-authz
          image: node:20.18-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: PORT
              value: "8080"
            - name: GOTRUE_URL
              value: "http://gotrue-auth:9999"
            - name: GOTRUE_AUTHORIZE_URL
              value: "https://auth.example.com"
            - name: HOST_APP_MAP
              valueFrom:
                configMapKeyRef:
                  name: gotrue-authz-config
                  key: HOST_APP_MAP
          volumeMounts:
            - name: app-script
              mountPath: /app
      restartPolicy: Always
      volumes:
        - name: app-script
          configMap:
            name: gotrue-authz-config
            items:
              - key: server.js
                path: server.js
              - key: landing.html
                path: landing.html
              - key: error.html
                path: error.html
