apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotrue-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotrue-auth
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gotrue-auth
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
        # supabase/gotrue expects the auth schema and a postgres role to exist
        - name: init-gotrue-db
          image: postgres:16
          command:
            - sh
            - -c
            - |
              DB_BASE=$(echo "$DATABASE_URL" | sed 's/?.*//')
              psql "$DB_BASE" -c "CREATE SCHEMA IF NOT EXISTS auth;"
              psql "$DB_BASE" -c "DO \$body\$ BEGIN CREATE ROLE postgres WITH LOGIN SUPERUSER; EXCEPTION WHEN duplicate_object THEN NULL; END \$body\$;"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gotrue-secret
                  key: DATABASE_URL
      containers:
        - name: gotrue
          image: supabase/gotrue:v2.188.1
          ports:
            - containerPort: 9999
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          env:
            - name: PORT
              value: "9999"
            - name: GOTRUE_DB_DRIVER
              value: postgres
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gotrue-secret
                  key: DATABASE_URL
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gotrue-secret
                  key: GOTRUE_JWT_SECRET
            - name: GOTRUE_JWT_EXP
              value: "3600"
            # Only pre-registered users can log in — user DB is the allowlist
            - name: GOTRUE_DISABLE_SIGNUP
              value: "true"
            # Auto-confirm emails (admin manages users via API)
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: "true"
            # Public URL for this Gotrue instance — patch per overlay
            - name: API_EXTERNAL_URL
              value: "https://auth.example.com"
            - name: GOTRUE_SITE_URL
              value: "https://auth.example.com"
            - name: GOTRUE_URI_ALLOW_LIST
              value: "*"
            # Google OAuth
            - name: GOTRUE_EXTERNAL_GOOGLE_ENABLED
              value: "true"
            - name: GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gotrue-secret
                  key: GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID
            - name: GOTRUE_EXTERNAL_GOOGLE_SECRET
              valueFrom:
                secretKeyRef:
                  name: gotrue-secret
                  key: GOTRUE_EXTERNAL_GOOGLE_SECRET
            # Google OAuth callback URI — patch per overlay
            - name: GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI
              value: "https://auth.example.com/callback"
      restartPolicy: Always
