apiVersion: v1
kind: Secret
metadata:
  name: gotrue-secret
type: Opaque
stringData:
  # JWT — must match GOTRUE_JWT_SECRET used by gotrue-authz
  GOTRUE_JWT_SECRET: "changeme_jwt_secret_min_32_chars_long"
  # Database
  DATABASE_URL: "postgres://gotrue:changeme_gotrue_db_password@postgres:5432/gotrue_auth?search_path=auth"
  # Google OAuth — patch with real tenant credentials
  GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: "changeme_google_client_id"
  GOTRUE_EXTERNAL_GOOGLE_SECRET: "changeme_google_client_secret"
