# gotrue-auth: validates JWT via gotrue-authz service → 401 if unauthenticated, 403 if unauthorized
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gotrue-auth
spec:
  forwardAuth:
    address: "http://override"
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
