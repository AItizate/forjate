apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Debezium Server — MariaDB Binlog → RabbitMQ CDC
#
# Captures all writes to MariaDB tables and publishes them as
# AMQP messages to RabbitMQ. No application code changes required.
#
# Event routing key: {topic.prefix}.{database}.{table}
#   e.g.: cdc.mydb.orders, cdc.mydb.users
#
# Dependencies (must be included in the tenant overlay):
#   - k8s/components/apps/brokers/rabbitmq  (or external RabbitMQ)
#
# Requirement: MariaDB must have binlog enabled with ROW format.
#   binlog_format=ROW
#   binlog_row_image=FULL
#   The connecting user needs REPLICATION SLAVE and REPLICATION CLIENT privileges.
#
# The tenant overlay must provide:
#   1. Secret (debezium-mariadb-rabbitmq-secret) with:
#        MARIADB_HOST=mariadb-host
#        MARIADB_PORT=3306
#        MARIADB_USER=<user>
#        MARIADB_PASSWORD=<password>
#        RABBITMQ_USER=<user>
#        RABBITMQ_PASS=<password>
#   2. Patch on ConfigMap for debezium.source.table.include.list
#        (e.g.: mydb.orders,mydb.users)
#   3. Patch on ConfigMap for debezium.source.database.include.list
#        (e.g.: mydb)
#   4. Patch on ConfigMap if RabbitMQ is in a different namespace:
#        debezium.sink.rabbitmq.connection.host
#
# Offsets: persisted on PVC (debezium-mariadb-rabbitmq-data).
#   If the PVC is deleted, Debezium re-snapshots from the beginning.
#
# Replicas: always 1. Multiple instances would produce duplicate events.

resources:
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml

labels:
  - pairs:
      app.kubernetes.io/ait-component: debezium-mariadb-rabbitmq
