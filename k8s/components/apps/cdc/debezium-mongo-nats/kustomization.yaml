apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Debezium Server — MongoDB Change Streams → NATS JetStream CDC
#
# Captures all writes to MongoDB collections and publishes them as
# messages to NATS JetStream. No application code changes required.
#
# Event subject: {topic.prefix}.{database}.{collection}
#   e.g.: cdc.mydb.orders, cdc.mydb.users
#
# Dependencies (must be included in the tenant overlay):
#   - k8s/components/apps/brokers/nats  (or external NATS)
#
# Requirement: MongoDB must run in replica set mode (even single-node).
#   Initialization: mongosh --eval 'rs.initiate()'
#
# The tenant overlay must provide:
#   1. Secret (debezium-mongo-nats-secret) with:
#        MONGODB_URI=mongodb://user:pass@mongo-host:27017/?replicaSet=rs0&authSource=admin
#        NATS_USER=<user>
#        NATS_PASS=<password>
#   2. Patch on ConfigMap for debezium.source.collection.include.list
#        (e.g.: mydb.orders,mydb.users  or  mydb.* for the entire DB)
#   3. Patch on ConfigMap if NATS is in a different namespace:
#        debezium.sink.nats-jetstream.url
#
# Note: the nats-stream-init Job auto-resolves the NATS namespace
# via the Kubernetes downward API — no patch needed for it.
#
# Offsets: persisted on PVC (debezium-mongo-nats-data).
#   If the PVC is deleted, Debezium re-snapshots from the beginning.
#
# Replicas: always 1. Multiple instances would produce duplicate events.

resources:
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - nats-stream-init-job.yaml

labels:
  - pairs:
      app.kubernetes.io/ait-component: debezium-mongo-nats
