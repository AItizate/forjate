apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
data:
  config.toml: |
    # Stalwart Mail Server — base configuration
    # Tenant overlays should patch this ConfigMap with real values
    #
    # Environment variable macros: %{env:VAR_NAME}%
    # See: https://stalw.art/docs/configuration/overview/

    [server]
    hostname = "stalwart.example.com"

    # ---------- Listeners ----------

    [server.listener.smtp]
    bind = ["0.0.0.0:25"]
    protocol = "smtp"

    [server.listener.submission]
    bind = ["0.0.0.0:587"]
    protocol = "smtp"

    [server.listener.imaps]
    bind = ["0.0.0.0:993"]
    protocol = "imap"
    tls.implicit = true

    [server.listener.http]
    bind = ["0.0.0.0:8080"]
    protocol = "http"

    # ---------- Storage backends ----------

    [store.postgres]
    type = "postgresql"
    host = "postgres"
    port = 5432
    database = "stalwart"
    user = "%{env:POSTGRES_USER}%"
    password = "%{env:POSTGRES_PASSWORD}%"

    [store.s3]
    type = "s3"
    bucket = "stalwart"
    endpoint = "http://minio:9000"
    access-key = "%{env:S3_ACCESS_KEY}%"
    secret-key = "%{env:S3_SECRET_KEY}%"
    region = "us-east-1"

    [store.redis]
    type = "redis"
    urls = ["redis://redis:6379"]

    # ---------- Directory (user/auth backend) ----------

    [directory."internal"]
    type = "internal"
    store = "postgres"

    [storage]
    data = "postgres"
    blob = "s3"
    lookup = "postgres"
    fts = "postgres"
    directory = "internal"
    in-memory = "redis"

    # ---------- TLS ----------
    # Disabled at Stalwart level — Traefik handles TLS termination
    # Tenants needing direct SMTP/IMAP TLS must configure certificates here

    # ---------- Admin ----------

    [authentication.fallback-admin]
    user = "admin"
    secret = "%{env:STALWART_ADMIN_PASSWORD}%"
