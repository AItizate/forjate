apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stalwart
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/stalwart/etc
              cp /config/config.toml /opt/stalwart/etc/config.toml
              echo "Config copied from ConfigMap."
          volumeMounts:
            - name: stalwart-data
              mountPath: /opt/stalwart
            - name: stalwart-config
              mountPath: /config
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
      containers:
        - name: stalwart
          image: stalwartlabs/stalwart:v0.15.5
          ports:
            - name: smtp
              containerPort: 25
            - name: submission
              containerPort: 587
            - name: imaps
              containerPort: 993
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
            - name: STALWART_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: STALWART_ADMIN_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: POSTGRES_PASSWORD
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: S3_SECRET_KEY
          # TCP probes instead of HTTP to avoid triggering Stalwart's
          # fail2ban/rate limiter on unauthenticated health check requests
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: stalwart-data
              mountPath: /opt/stalwart
      restartPolicy: Always
      volumes:
        - name: stalwart-data
          persistentVolumeClaim:
            claimName: stalwart-data
        - name: stalwart-config
          configMap:
            name: stalwart-config
