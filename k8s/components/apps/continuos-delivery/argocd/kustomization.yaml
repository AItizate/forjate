apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set the namespace for all resources
namespace: argocd

# This file is used to deploy ArgoCD in a Kubernetes cluster.
# It references the official ArgoCD installation manifests.
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - namespace.yaml
  - certificate.yaml
  - ingress.yaml
