apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# PostgreSQL 16 — generic reusable database component
#
# Resources: StatefulSet (postgres), Service (postgres), Secret (postgres-secret)
#
# Tenant overlay must provide real credentials via:
#   - SealedSecret replacing postgres-secret, OR
#   - secretGenerator in overlay
#
# To run multiple instances in the same namespace, use namePrefix
# in an intermediate kustomization:
#   resources:
#     - path/to/databases/postgres
#   namePrefix: myapp-
#   → produces: myapp-postgres (StatefulSet, Service), myapp-postgres-secret (Secret)

resources:
  # - secret.yaml # Tenant overlay must provide real credentials (SealedSecret, secretGenerator, etc.)
  - service.yaml
  - statefulset.yaml

labels:
  - pairs:
      app.kubernetes.io/ait-component: postgres
