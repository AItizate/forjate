apiVersion: v1
kind: Secret
metadata:
  name: minio-storage-configuration
type: Opaque
stringData:
  config.env: |-
    export MINIO_ROOT_USER="MINIO_ROOT_USER_PLACEHOLDER"
    export MINIO_ROOT_PASSWORD="MINIO_ROOT_PASSWORD_PLACEHOLDER"
    export MINIO_STORAGE_CLASS_STANDARD="EC:2"
    export MINIO_BROWSER="on"
