apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-cluster-config
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: cluster
data:
  config.yaml: |
    receivers:
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
          - PIDPressure
        allocatable_types_to_report:
          - cpu
          - memory
          - storage

    processors:
      resource:
        attributes:
          - key: k8s.cluster.name
            value: "${CLUSTER_NAME}"
            action: upsert

      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      otlphttp:
        endpoint: "${GRAFANA_CLOUD_OTLP_ENDPOINT}"
        headers:
          Authorization: "Basic ${GRAFANA_CLOUD_API_KEY}"

    service:
      pipelines:
        metrics:
          receivers: [k8s_cluster]
          processors: [resource, batch]
          exporters: [otlphttp]

      telemetry:
        logs:
          level: info
