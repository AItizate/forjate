apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      service: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: n8n
    spec:
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown 1000:1000 /data"]
          volumeMounts:
            - name: n8n-claim0
              mountPath: /data
      containers:
        - command:
            - /bin/sh
          args:
            - -c
            - sleep 5; n8n start
            # Uncomment the next line to enable debugging with Node.js inspector
            # - sleep 5; node --inspect=0.0.0.0:9229 $(which n8n) start
          image: n8nio/n8n
          name: n8n
          ports:
            - containerPort: 5678
            # Uncomment the next line to enable debugging with Node.js inspector
            # - containerPort: 9229
          resources:
            requests:
              cpu: "150m"
              memory: "250Mi"
            limits:
              cpu: "350m"
              memory: "500Mi"
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres-service
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: n8n
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_PASSWORD
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_PORT
              value: "5678"
            - name: N8N_HOST
              value: n8n.example.com
            - name: N8N_EDITOR_BASE_URL
              value: https://n8n.example.com
            - name: N8N_TRUST_PROXY
              value: "true"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_LOG_LEVEL
              value: debug
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: WEBHOOK_URL
              value: https://n8n.example.com
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: n8n-claim0
      restartPolicy: Always
      volumes:
        - name: n8n-claim0
          persistentVolumeClaim:
            claimName: pvc-n8n-claim0
        - name: n8n-secret
          secret:
            secretName: n8n-secret
        - name: postgres-secret
          secret:
            secretName: postgres-secret
