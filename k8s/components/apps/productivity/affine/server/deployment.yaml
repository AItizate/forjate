apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affine
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: affine
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 3;
              done
        - name: migration
          image: ghcr.io/toeverything/affine:0.26.3
          command:
            - sh
            - -c
            - node ./scripts/self-host-predeploy.js
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: DATABASE_URL
            - name: REDIS_SERVER_HOST
              value: "redis"
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config-rw
              mountPath: /root/.affine/config
            - name: affine-config-cm
              mountPath: /root/.affine/config/config.json
              subPath: config.json
      containers:
        - name: affine
          image: ghcr.io/toeverything/affine:0.26.3
          ports:
            - containerPort: 3010
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: DATABASE_URL
            - name: REDIS_SERVER_HOST
              value: "redis"
            - name: AFFINE_SERVER_PORT
              value: "3010"
            - name: AFFINE_SERVER_HTTPS
              value: "true"
            - name: AFFINE_SERVER_HOST
              value: "affine.example.com"
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config-rw
              mountPath: /root/.affine/config
            - name: affine-config-cm
              mountPath: /root/.affine/config/config.json
              subPath: config.json
          readinessProbe:
            httpGet:
              path: /
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 10
      restartPolicy: Always
      volumes:
        - name: affine-storage
          emptyDir: {}
        - name: affine-config-rw
          emptyDir: {}
        - name: affine-config-cm
          configMap:
            name: affine-config
