apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appflowy-ai
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: appflowy-ai
    spec:
      initContainers:
        - name: wait-for-appflowy-cloud
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z appflowy-cloud 8000; do
                echo "Waiting for appflowy-cloud..."; sleep 3;
              done
      containers:
        - name: appflowy-ai
          image: appflowyinc/appflowy_ai:0.13.3
          ports:
            - containerPort: 5001
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: AI_SERVER_PORT
              value: "5001"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: AI_OPENAI_API_KEY
            - name: DEFAULT_AI_MODEL
              value: "gpt-4.1-mini"
            - name: DEFAULT_AI_COMPLETION_MODEL
              value: "gpt-4.1-mini"
            - name: AI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: DATABASE_URL
            - name: AI_REDIS_URL
              value: "redis://redis:6379"
            - name: AI_USE_MINIO
              value: "true"
            - name: AI_MINIO_URL
              value: "http://minio:9000"
            - name: APPFLOWY_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: APPFLOWY_S3_ACCESS_KEY
            - name: APPFLOWY_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: APPFLOWY_S3_SECRET_KEY
            - name: APPFLOWY_S3_BUCKET
              value: "appflowy"
            - name: APPFLOWY_S3_REGION
              value: "us-east-1"
            - name: AI_APPFLOWY_HOST
              value: "http://appflowy-cloud:8000"
            - name: APPFLOWY_GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: GOTRUE_JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
      restartPolicy: Always
