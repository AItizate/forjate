apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appflowy-cloud
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: appflowy-cloud
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
        - name: wait-for-gotrue
          image: postgres:16
          command:
            - sh
            - -c
            - |
              # Wait for Gotrue port AND for the auth schema to exist
              # Gotrue creates the auth schema during its migrations
              until pg_isready -h postgres -U appflowy; do
                echo "Waiting for postgres..."; sleep 2;
              done
              until psql "$DATABASE_URL" -c "SELECT schema_name FROM information_schema.schemata WHERE schema_name = 'auth'" | grep -q auth; do
                echo "Waiting for auth schema (Gotrue migrations)..."; sleep 3;
              done
              echo "Auth schema ready."
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: DATABASE_URL
      containers:
        - name: appflowy-cloud
          image: appflowyinc/appflowy_cloud:0.13.3
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
            - name: RUST_LOG
              value: "info"
            # AI service — points to appflowy-ai sidecar (not LiteLLM directly)
            - name: AI_SERVER_HOST
              value: "http://appflowy-ai"
            - name: AI_SERVER_PORT
              value: "5001"
            - name: AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: AI_OPENAI_API_KEY
            - name: APPFLOWY_ENVIRONMENT
              value: "production"
            # Public URLs — must be patched by overlay
            - name: APPFLOWY_WEB_URL
              value: "https://appflowy.example.com"
            - name: APPFLOWY_BASE_URL
              value: "https://appflowy.example.com"
            - name: APPFLOWY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: DATABASE_URL
            - name: APPFLOWY_REDIS_URI
              value: "redis://redis:6379"
            - name: APPFLOWY_GOTRUE_BASE_URL
              value: "http://appflowy-gotrue:9999"
            - name: APPFLOWY_GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: GOTRUE_JWT_SECRET
            - name: APPFLOWY_GOTRUE_JWT_EXP
              value: "7200"
            # MinIO / S3 storage
            - name: APPFLOWY_S3_MINIO_URL
              value: "http://minio:9000"
            - name: APPFLOWY_S3_BUCKET
              value: "appflowy"
            - name: APPFLOWY_S3_REGION
              value: "us-east-1"
            - name: APPFLOWY_S3_CREATE_BUCKET
              value: "true"
            - name: APPFLOWY_S3_USE_MINIO
              value: "true"
            - name: APPFLOWY_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: APPFLOWY_S3_ACCESS_KEY
            - name: APPFLOWY_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: APPFLOWY_S3_SECRET_KEY
            - name: APPFLOWY_ACCESS_CONTROL
              value: "true"
            - name: APPFLOWY_CASBIN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: DATABASE_URL
            - name: APPFLOWY_DATABASE_MAX_CONNECTIONS
              value: "40"
            - name: APPFLOWY_WEBSOCKET_MAILBOX_SIZE
              value: "6000"
            # Search service
            - name: APPFLOWY_SEARCH_SERVICE_URL
              value: "http://appflowy-search:4002"
            - name: APPFLOWY_SEARCH_REQUEST_TIMEOUT_SECS
              value: "10"
      restartPolicy: Always
