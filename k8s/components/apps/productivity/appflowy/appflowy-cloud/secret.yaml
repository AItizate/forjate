apiVersion: v1
kind: Secret
metadata:
  name: appflowy-secret
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgres://appflowy:changeme_appflowy_db_password@postgres:5432/appflowy_cloud"
  # search_path=auth required so Gotrue can find its tables without schema prefix
  GOTRUE_DATABASE_URL: "postgres://appflowy:changeme_appflowy_db_password@postgres:5432/appflowy_cloud?search_path=auth"
  # JWT — must match the value set in Gotrue
  GOTRUE_JWT_SECRET: "changeme_jwt_secret_min_32_chars_long"
  # MinIO / S3 storage
  APPFLOWY_S3_ACCESS_KEY: "changeme_minio_access_key"
  APPFLOWY_S3_SECRET_KEY: "changeme_minio_secret_key"
  # SMTP
  GOTRUE_SMTP_HOST: "smtp.example.com"
  GOTRUE_SMTP_PORT: "465"
  GOTRUE_SMTP_USER: "user@example.com"
  GOTRUE_SMTP_PASS: "changeme_smtp_password"
  GOTRUE_SMTP_ADMIN_EMAIL: "admin@example.com"
  # Admin user — created on first Gotrue startup
  GOTRUE_ADMIN_EMAIL: "admin@example.com"
  GOTRUE_ADMIN_PASSWORD: "changeme_admin_password"
  # AI — optional, only needed if appflowy-ai is enabled
  AI_OPENAI_API_KEY: "changeme_openai_api_key"
