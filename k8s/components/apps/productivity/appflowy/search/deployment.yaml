apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appflowy-search
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: appflowy-search
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 3;
              done
      containers:
        - name: appflowy-search
          image: appflowyinc/appflowy_search:0.13.3
          ports:
            - containerPort: 4002
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: RUST_LOG
              value: "info"
            - name: APPFLOWY_SEARCH_HOST
              value: "[::]"
            - name: APPFLOWY_SEARCH_PORT
              value: "4002"
            - name: APPFLOWY_SEARCH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: DATABASE_URL
            - name: APPFLOWY_SEARCH_REDIS_URL
              value: "redis://redis:6379"
            - name: AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: AI_OPENAI_API_KEY
            - name: APPFLOWY_BACKGROUND_INDEXER_ENABLED
              value: "true"
            - name: APPFLOWY_INDEXER_DATABASE_ENABLED
              value: "false"
            - name: APPFLOWY_KEYWORD_SEARCH_ENABLED
              value: "true"
            - name: APPFLOWY_KEYWORD_WORKER_ENABLED
              value: "true"
            - name: APPFLOWY_KEYWORD_INDEX_MAP_SIZE_BYTES
              value: "2147483648"
            - name: APPFLOWY_KEYWORD_INDEX_DIR
              value: "/var/lib/appflowy/keyword_index"
            - name: APPFLOWY_GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: GOTRUE_JWT_SECRET
          volumeMounts:
            - name: keyword-index
              mountPath: /var/lib/appflowy/keyword_index
      restartPolicy: Always
      volumes:
        - name: keyword-index
          emptyDir: {}
