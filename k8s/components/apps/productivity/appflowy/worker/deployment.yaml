apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appflowy-worker
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: appflowy-worker
    spec:
      initContainers:
        - name: wait-for-appflowy-cloud
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z appflowy-cloud 8000; do
                echo "Waiting for appflowy-cloud..."; sleep 3;
              done
      containers:
        - name: appflowy-worker
          image: appflowyinc/appflowy_worker:0.13.3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          env:
            - name: RUST_LOG
              value: "info"
            - name: APPFLOWY_ENVIRONMENT
              value: "production"
            - name: APPFLOWY_WORKER_ENVIRONMENT
              value: "production"
            - name: APPFLOWY_WORKER_REDIS_URL
              value: "redis://redis:6379"
            - name: APPFLOWY_WORKER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: DATABASE_URL
            - name: APPFLOWY_WORKER_DATABASE_NAME
              value: "appflowy_cloud"
            - name: APPFLOWY_WORKER_IMPORT_TICK_INTERVAL
              value: "30"
            - name: APPFLOWY_S3_USE_MINIO
              value: "true"
            - name: APPFLOWY_S3_MINIO_URL
              value: "http://minio:9000"
            - name: APPFLOWY_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: APPFLOWY_S3_ACCESS_KEY
            - name: APPFLOWY_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: APPFLOWY_S3_SECRET_KEY
            - name: APPFLOWY_S3_BUCKET
              value: "appflowy"
            - name: APPFLOWY_S3_REGION
              value: "us-east-1"
            - name: APPFLOWY_MAILER_SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: SMTP_HOST
                  optional: true
            - name: APPFLOWY_MAILER_SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: SMTP_PORT
                  optional: true
            - name: APPFLOWY_MAILER_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: SMTP_USER
                  optional: true
            - name: APPFLOWY_MAILER_SMTP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: SMTP_ADMIN_EMAIL
                  optional: true
            - name: APPFLOWY_MAILER_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appflowy-secret
                  key: SMTP_PASS
                  optional: true
      restartPolicy: Always
