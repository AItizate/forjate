apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-nfs-storage-template
  labels:
    disk: template
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage
  nfs:
    server: neuronnas.local
    path: /externalDisk250